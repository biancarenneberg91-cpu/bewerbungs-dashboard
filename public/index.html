<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team-Bewerbungen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="topbar">
    <div class="brand">Team-Bewerbungen</div>
    <nav id="logoutNav" style="display:none;"><a href="#" id="logoutLink">Abmelden</a></nav>
  </div>

  <div class="container">
    <div id="flash" class="flash" style="display:none;"></div>

    <!-- Login -->
    <div id="loginView" style="max-width: 380px; margin: 80px auto 0;">
      <div class="card">
        <div class="mono" style="color: var(--cyan); font-size: 13px; margin-bottom: 6px;">&gt; system.auth</div>
        <h2 style="margin: 0 0 24px;">Dashboard-Zugang</h2>
        <form id="loginForm">
          <label class="mono" style="font-size: 12px; color: var(--text-dim); display: block; margin-bottom: 6px;">Passwort</label>
          <input type="password" id="passwordInput" autofocus required class="input" style="margin-bottom: 18px;">
          <button type="submit" class="btn btn-primary" style="width: 100%;">Anmelden</button>
        </form>
      </div>
    </div>

    <!-- Übersicht -->
    <div id="dashboardView" style="display:none;">
      <div style="display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px;">
        <h1 style="margin: 0; font-size: 24px;">Bewerbungen</h1>
        <div id="filterButtons" style="display: flex; gap: 6px;"></div>
      </div>
      <div id="appsList" style="display: flex; flex-direction: column; gap: 10px;"></div>
      <div id="emptyState" style="display:none; text-align: center; padding: 80px 20px; color: var(--text-dim);">
        <div class="mono" style="color: var(--cyan); margin-bottom: 8px;">&gt; keine treffer</div>
        Noch keine Bewerbungen in dieser Kategorie.
      </div>
    </div>

    <!-- Detail -->
    <div id="detailView" style="display:none;">
      <a href="#" id="backLink" class="mono" style="color: var(--text-dim); font-size: 13px;">&larr; zurück</a>
      <div id="detailContent"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
